name: nilda_ec3

services:

  postgres:
    image: postgres:16
    container_name: nilda-postgres
    environment:
      POSTGRES_DB: db_almacen_nilda
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: on-failure

  keycloak:
    build:
      context: ./docker/keycloak
      dockerfile: Dockerfile
    container_name: nilda-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    restart: on-failure

  ms-descubridor:
    build:
      context: .
      dockerfile: ms-descubridor/Dockerfile
    container_name: nilda-ms-descubridor
    ports:
      - "8761:8761"
    restart: on-failure

  ms-configserver:
    build:
      context: .
      dockerfile: ms-configserver/Dockerfile
    container_name: nilda-ms-configserver
    ports:
      - "8888:8888"
    restart: on-failure

  ms-inventario:
    build:
      context: .
      dockerfile: ms-inventario/Dockerfile
    container_name: nilda-ms-inventario
    environment:
      CONFIG_SERVER_URL: http://ms-configserver:8888/
      DB_URL: jdbc:postgresql://postgres:5432/db_almacen_nilda
      DB_USER: root
      DB_PASSWORD: root
      EUREKA_URL: http://ms-descubridor:8761/eureka/
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - ms-configserver
      - ms-descubridor
    restart: on-failure

  ms-pedido:
    build:
      context: .
      dockerfile: ms-pedido/Dockerfile
    container_name: nilda-ms-pedido
    environment:
      CONFIG_SERVER_URL: http://ms-configserver:8888/
      DB_URL: jdbc:postgresql://postgres:5432/db_almacen_nilda
      DB_USER: root
      DB_PASSWORD: root
      EUREKA_URL: http://ms-descubridor:8761/eureka/
      INVENTARIO_URL: http://ms-inventario:8083/v1/productos
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - ms-configserver
      - ms-descubridor
      - ms-inventario
    restart: on-failure

  demogw:
    build:
      context: .
      dockerfile: demogw/Dockerfile
    container_name: nilda-demogw
    environment:
      EUREKA_URL: http://ms-descubridor:8761/eureka/
      INVENTARIO_URI: http://ms-inventario:8083
      PEDIDO_URI: http://ms-pedido:8084
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/spring-realm
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/spring-realm/protocol/openid-connect/certs
    ports:
      - "9090:9090"
    depends_on:
      - keycloak
      - ms-descubridor
      - ms-inventario
      - ms-pedido
    restart: on-failure

volumes:
  postgres_data: